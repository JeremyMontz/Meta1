<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canon — Claudemonzter</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:         #0a0a0f;
      --surface:    #111118;
      --surface2:   #16161f;
      --border:     #1e1e2e;
      --accent:     #00ff9d;
      --accent2:    #7b61ff;
      --warn:       #ff8c00;
      --error:      #ff4f4f;
      --info:       #4fc3f7;
      --text:       #e0e0f0;
      --muted:      #5a5a7a;
      --mono:       'JetBrains Mono', monospace;
      --sans:       'Syne', sans-serif;

      /* Canon Integrity colors */
      --ci-clean:   #00ff9d;
      --ci-alert:   #ffb700;
      --ci-error:   #ff4f4f;
      --ci-none:    #5a5a7a;  /* Jeremy — not applicable */

      /* File flag colors */
      --flag-clean:      #00ff9d;
      --flag-alert:      #ffb700;
      --flag-onloan:     #7b61ff;
      --flag-orphaned:   #ff8c00;
      --flag-phantom:    #ff4f4f;
      --flag-stale:      #ffb700;
      --flag-native:     #c084fc;
      --flag-error:      #ff4f4f;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      min-height: 100vh;
      padding: 2rem 1.5rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,157,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,157,0.025) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .page { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; }

    /* Header */
    .header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .header-tag {
      font-size: 0.62rem;
      letter-spacing: 0.22em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 0.35rem;
    }

    h1 {
      font-family: var(--sans);
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    h1 span { color: var(--accent); }

    .header-meta { text-align: right; }

    .last-refresh {
      font-size: 0.62rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    .refresh-btn {
      margin-top: 0.4rem;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      padding: 0.3rem 0.75rem;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      display: block;
      margin-left: auto;
    }

    .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* Legend */
    .legend {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
      flex-wrap: wrap;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 0.75rem 1rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.6rem;
      letter-spacing: 0.06em;
      color: var(--muted);
    }

    .legend-flag { font-size: 0.65rem; font-weight: 600; }

    /* Section header */
    .section-header {
      font-family: var(--sans);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent2);
      padding: 0.6rem 0.75rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-bottom: none;
      margin-top: 1.5rem;
    }

    /* Table */
    .canon-table {
      width: 100%;
      border-collapse: collapse;
      border: 1px solid var(--border);
      border-top: none;
      table-layout: fixed;
    }

    .canon-table thead tr {
      background: var(--surface2);
      border-bottom: 2px solid var(--border);
    }

    .canon-table th {
      padding: 0.5rem 0.75rem;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
      border-right: 1px solid var(--border);
      vertical-align: top;
      overflow: hidden;
    }

    .canon-table th.col-file { text-align: left; }

    /* Agent name in header */
    .th-agent-name {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--text);
      display: block;
      margin-bottom: 0.2rem;
    }

    /* Canon Integrity status line — sits directly under agent name */
    .th-ci {
      font-size: 0.55rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      display: block;
      margin-top: 0.15rem;
    }

    /* Jeremy header — no CI chip */
    .th-jeremy-label {
      font-size: 0.52rem;
      color: var(--muted);
      font-weight: 400;
      letter-spacing: 0.06em;
      font-style: italic;
      display: block;
      margin-top: 0.15rem;
    }

    .canon-table td {
      padding: 0.4rem 0.75rem;
      font-size: 0.68rem;
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
      vertical-align: middle;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .canon-table tr:hover td { background: rgba(255,255,255,0.02); }

    .canon-table td.col-file { color: var(--text); }

    .canon-table td.col-file .location-tag {
      font-size: 0.55rem;
      color: var(--muted);
      margin-left: 0.4rem;
      letter-spacing: 0.08em;
    }

    .canon-table td.col-agent { text-align: center; }

    /* Folder separator row */
    .canon-table tr.folder-row td {
      background: var(--surface);
      color: var(--muted);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.4rem 0.75rem;
      border-top: 2px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    /* Flag cell */
    .flag-cell {
      display: inline-block;
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 0.15rem 0.4rem;
      border-radius: 2px;
      white-space: nowrap;
    }

    .flag-clean    { color: var(--flag-clean);   background: rgba(0,255,157,0.08); }
    .flag-alert    { color: var(--flag-alert);   background: rgba(255,183,0,0.1); }
    .flag-onloan   { color: var(--flag-onloan);  background: rgba(123,97,255,0.1); }
    .flag-orphaned { color: var(--flag-orphaned);background: rgba(255,140,0,0.1); }
    .flag-phantom  { color: var(--flag-phantom); background: rgba(255,79,79,0.1); }
    .flag-stale    { color: var(--flag-stale);   background: rgba(255,183,0,0.1); }
    .flag-native   { color: var(--flag-native);  background: rgba(192,132,252,0.1); }
    .flag-error    { color: var(--flag-error);   background: rgba(255,79,79,0.1); }
    .flag-empty    { color: var(--border);        font-size: 0.5rem; font-weight: 400; }

    /* State messages */
    .state-msg {
      text-align: center;
      padding: 3rem 2rem;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .state-msg .big {
      font-family: var(--sans);
      font-size: 1.5rem;
      color: var(--text);
      margin-bottom: 0.5rem;
      font-weight: 700;
    }

    /* Footer */
    .footer {
      margin-top: 1.5rem;
      font-size: 0.58rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>
  <div class="page">

    <div class="header">
      <div class="header-left">
        <div class="header-tag">// canon integrity</div>
        <h1>Canon <span>Matrix</span></h1>
      </div>
      <div class="header-meta">
        <div class="last-refresh" id="lastRefresh">—</div>
        <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
      </div>
    </div>

    <div id="canonOutput">
      <div class="state-msg">
        <div class="big">Loading...</div>
        <div>Fetching canon data</div>
      </div>
    </div>

    <div class="legend">
      <div class="legend-item"><span class="legend-flag" style="color:var(--flag-clean)">●</span> Clean</div>
      <div class="legend-item"><span class="legend-flag" style="color:var(--flag-error)">✕</span> Error (required doc missing)</div>
      <div class="legend-item"><span class="legend-flag" style="color:var(--flag-phantom)">✕</span> Phantom</div>
      <div class="legend-item"><span class="legend-flag" style="color:var(--flag-alert)">⚠</span> Alert (misplaced)</div>
      <div class="legend-item"><span class="legend-flag" style="color:var(--flag-orphaned)">!</span> Orphaned</div>
      <div class="legend-item"><span class="legend-flag" style="color:var(--flag-onloan)">⟳</span> On loan</div>
      <div class="legend-item"><span class="legend-flag" style="color:var(--flag-native)">⬡</span> Claude.ai-native</div>
      <div class="legend-item"><span class="legend-flag" style="color:var(--flag-stale)">⚠</span> Stale</div>
      <div class="legend-item"><span class="legend-flag" style="color:var(--muted)">·</span> Not declared</div>
    </div>

    <div class="footer">
      <span>canon v0.2</span>
      <span id="fileCount">—</span>
    </div>

  </div>

  <!-- Embedded JSON data block for Claude/QA readability -->
  <script type="application/json" id="canon-data">
  {
    "generated": null,
    "agents": [],
    "files": []
  }
  </script>

  <script>
    // ============================================================
    // CONFIG — Jeremy-controlled
    // ============================================================

    var SHEET_ID   = "12JrRfdHx2u2wsU_KQPHkYDRNk3_jUIEV9zSq4lFe8KE";
    var TAB_STATUS = "AgentStatus";
    var TAB_FILES  = "FilesReported";

    // AGENT_ORDER is built dynamically from the AgentStatus sheet at load time.
    // Derived from the Agent Order column — numeric, Jeremy-controlled via sheet.
    // Fallback: agents without an order value sort to end alphabetically.
    // Do not hardcode this array — the sheet is the authority.
    var AGENT_ORDER = []; // populated in loadData() from sheet Agent Order column

    // Required documents for Canon Integrity computation.
    // Tier 1 = system-level (graph-wide).
    // Tier 2 = agent-level (number slot is the signal, title varies).
    // Phil is exempt from Profile. All others require both Tier 1 docs.
    var REQUIRED_TIER1 = {
      wire:    "Meta1 01",   // prefix match — Communication Protocol
      profile: "Meta1 00"    // prefix match — Profile (Phil exempt)
    };
    // Tier 2: each agent must declare their own 01 and 02 docs.
    // Detected by: filename starts with agent name AND contains " 01" or " 02".

    // ============================================================
    // UTILITIES
    // ============================================================

    function sheetUrl(tab) {
      return "https://docs.google.com/spreadsheets/d/" + SHEET_ID +
             "/gviz/tq?tqx=out:csv&sheet=" + encodeURIComponent(tab);
    }

    function parseCSV(text) {
      var lines = text.trim().split("\n");
      if (lines.length < 2) return [];
      var headers = lines[0].split(",").map(function(h) {
        return h.replace(/^"|"$/g, "").trim();
      });
      return lines.slice(1).map(function(line) {
        var cols = [], inQuote = false, current = "";
        for (var i = 0; i < line.length; i++) {
          var ch = line[i];
          if (ch === '"') { inQuote = !inQuote; }
          else if (ch === ',' && !inQuote) { cols.push(current); current = ""; }
          else { current += ch; }
        }
        cols.push(current);
        var obj = {};
        headers.forEach(function(h, i) {
          obj[h] = (cols[i] || "").replace(/^"|"$/g, "").trim();
        });
        return obj;
      });
    }

    // Latest row per agent from AgentStatus (last row wins — append-only sheet).
    function latestAgentStatus(rows) {
      var map = {};
      rows.forEach(function(r) {
        var k = (r["Agent Nickname"] || "").toLowerCase();
        if (k) map[k] = r;
      });
      return map;
    }

    function escHtml(str) {
      return (str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;")
                        .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    // ============================================================
    // inferFolder()
    // Maps a filename to its owning agent name using name-prefix matching.
    // Current behavior (v2.x): first agent name match in AGENT_ORDER wins.
    // Future behavior (v3.x): will parse tier prefix segment instead.
    // All callers use this function — one function, one change point.
    // Returns agent name string, or null if no match (triggers Unknown).
    // ============================================================
    function inferFolder(fileName) {
      var lower = (fileName || "").toLowerCase();
      for (var i = 0; i < AGENT_ORDER.length; i++) {
        if (lower.startsWith(AGENT_ORDER[i].toLowerCase())) {
          return AGENT_ORDER[i];
        }
      }
      return null; // genuinely homeless — triggers Unknown column
    }

    // ============================================================
    // FLAG LOGIC
    // Determines flag for a file in a given agent's column.
    // Called per (file, agent) pair during matrix render.
    // ============================================================

    // Returns { sym, cls, label } for a flag string from the sheet,
    // or computes from context when called internally.
    function flagDisplay(flag) {
      if (!flag) return { sym: "·", cls: "flag-empty", label: "" };
      var f = flag.toLowerCase().trim();
      var map = {
        "clean":            { sym: "●", cls: "flag-clean",    label: "Clean" },
        "error":            { sym: "✕", cls: "flag-error",    label: "Error" },
        "phantom":          { sym: "✕", cls: "flag-phantom",  label: "Phantom" },
        "alert":            { sym: "⚠", cls: "flag-alert",    label: "Alert" },
        "orphaned":         { sym: "!",  cls: "flag-orphaned", label: "Orphaned" },
        "on loan":          { sym: "⟳", cls: "flag-onloan",   label: "On loan" },
        "onloan":           { sym: "⟳", cls: "flag-onloan",   label: "On loan" },
        "claude.ai-native": { sym: "⬡", cls: "flag-native",   label: "Native" },
        "native":           { sym: "⬡", cls: "flag-native",   label: "Native" },
        "stale":            { sym: "⚠", cls: "flag-stale",    label: "Stale" }
      };
      return map[f] || { sym: "?", cls: "flag-alert", label: flag };
    }

    // ============================================================
    // REQUIRED DOC CHECKER
    // Checks whether an agent's declared file list satisfies
    // required doc rules. Returns array of missing doc labels.
    // Current behavior: slot-based (number prefix).
    // Future behavior (v3.x): will read tier prefix instead.
    // Phil exempt from Profile requirement.
    // ============================================================
    function checkRequiredDocs(agentName, declaredFiles) {
      var missing = [];
      var isPhil  = agentName.toLowerCase() === "phil";
      var lowerFiles = declaredFiles.map(function(f) { return f.toLowerCase(); });

      // Tier 1 — Wire (all agents including Phil)
      var hasWire = lowerFiles.some(function(f) {
        return f.indexOf("meta1 01") !== -1;
      });
      if (!hasWire) missing.push("Wire (Meta1 01)");

      // Tier 1 — Profile (all except Phil)
      if (!isPhil) {
        var hasProfile = lowerFiles.some(function(f) {
          return f.indexOf("meta1 00") !== -1;
        });
        if (!hasProfile) missing.push("Profile (Meta1 00)");
      }

      // Tier 2 — Agent's own 01 doc
      var agentLower = agentName.toLowerCase();
      var hasOwn01 = lowerFiles.some(function(f) {
        return f.startsWith(agentLower) && f.indexOf(" 01") !== -1;
      });
      if (!hasOwn01) missing.push(agentName + " 01");

      // Tier 2 — Agent's own 02 doc
      var hasOwn02 = lowerFiles.some(function(f) {
        return f.startsWith(agentLower) && f.indexOf(" 02") !== -1;
      });
      if (!hasOwn02) missing.push(agentName + " 02");

      return missing;
    }

    // ============================================================
    // CANON INTEGRITY COMPUTATION
    // Computed by Meta1 per agent after reconciliation.
    // Clean / Alert / Error per rules in Meta1 04 — Canon Integrity Rules.
    // Jeremy is always exempt — returns null.
    // ============================================================
    function computeCanonIntegrity(agentName, declaredFiles, fileFlags) {
      if (agentName.toLowerCase() === "jeremy") return null;

      // Error conditions: missing required docs OR any Phantoms
      var missing = checkRequiredDocs(agentName, declaredFiles);
      if (missing.length > 0) return "Error";

      var hasPhantom = fileFlags.some(function(f) {
        return f.toLowerCase() === "phantom";
      });
      if (hasPhantom) return "Error";

      // No declaration received — treated as Error
      if (declaredFiles.length === 0) return "Error";

      // Alert conditions: orphaned, stale, misplaced (alert flag)
      var hasAlert = fileFlags.some(function(f) {
        var fl = f.toLowerCase();
        return fl === "orphaned" || fl === "stale" || fl === "alert";
      });
      if (hasAlert) return "Alert";

      return "Clean";
    }

    // CI color for header display
    function ciColor(ci) {
      var map = {
        "clean": "var(--ci-clean)",
        "alert": "var(--ci-alert)",
        "error": "var(--ci-error)"
      };
      return map[(ci || "").toLowerCase()] || "var(--ci-none)";
    }

    // ============================================================
    // MATRIX BUILD
    // Organizes FilesReported rows into Drive and Claude.ai sections.
    // Each entry: { agentFlags: { AgentName: flagString }, location }
    // Unknown = files whose folder cannot be inferred.
    // Jeremy's undeclared folder files are suppressed (not surfaced).
    // ============================================================
    function buildMatrix(fileRows) {
      var drive    = {}; // { folder: { fileName: { agentFlags, location } } }
      var claudeai = {};
      var unknown  = {}; // { fileName: { agentFlags, location } }

      fileRows.forEach(function(row) {
        var agent    = (row["Agent Nickname"] || "").trim();
        var fileName = (row["File Name"] || "").trim();
        var location = (row["Location"] || "Drive").trim();
        var flag     = (row["Flag"] || "").trim();
        if (!fileName) return;

        if (location === "Claude.ai") {
          // Claude.ai files grouped under declaring agent's project
          var proj = agent + " Project";
          if (!claudeai[proj]) claudeai[proj] = {};
          if (!claudeai[proj][fileName]) claudeai[proj][fileName] = { agentFlags: {}, location: "Claude.ai" };
          claudeai[proj][fileName].agentFlags[agent] = flag || "Claude.ai-native";

        } else {
          // Drive files — infer folder from filename prefix
          var folder = inferFolder(fileName);

          if (folder === null) {
            // Genuinely homeless — Unknown section
            if (!unknown[fileName]) unknown[fileName] = { agentFlags: {}, location: "Drive" };
            unknown[fileName].agentFlags[agent] = flag;

          } else if (folder.toLowerCase() === "jeremy") {
            // Jeremy's folder — only surface if an agent declares it (On loan)
            if (!drive["Jeremy"]) drive["Jeremy"] = {};
            if (!drive["Jeremy"][fileName]) drive["Jeremy"][fileName] = { agentFlags: {}, location: "Drive" };
            drive["Jeremy"][fileName].agentFlags[agent] = flag || "On loan";

          } else {
            // Normal agent folder
            if (!drive[folder]) drive[folder] = {};
            if (!drive[folder][fileName]) drive[folder][fileName] = { agentFlags: {}, location: "Drive" };
            drive[folder][fileName].agentFlags[agent] = flag;
          }
        }
      });

      return { drive: drive, claudeai: claudeai, unknown: unknown };
    }

    // ============================================================
    // RENDER
    // ============================================================

    // Render one table section. agentStatusMap used for CI values.
    // agentDeclaredFiles: { agentName: [fileNames] } for CI computation.
    function renderSection(title, folderMap, agentStatusMap, agentDeclaredFiles, includeUnknown) {
      var folders = Object.keys(folderMap);

      // Sort folders by AGENT_ORDER position
      var agentPos = {};
      AGENT_ORDER.forEach(function(name, i) { agentPos[name.toLowerCase()] = i; });

      folders.sort(function(a, b) {
        var aBase = a.replace(/ Project$/, "").toLowerCase();
        var bBase = b.replace(/ Project$/, "").toLowerCase();
        var aPos  = agentPos[aBase] !== undefined ? agentPos[aBase] : 9999;
        var bPos  = agentPos[bBase] !== undefined ? agentPos[bBase] : 9999;
        return aPos !== bPos ? aPos - bPos : a.localeCompare(b);
      });

      if (folders.length === 0) {
        return '<div class="section-header">' + title + '</div>' +
               '<div style="background:var(--surface);border:1px solid var(--border);border-top:none;' +
               'padding:1rem;font-size:0.68rem;color:var(--muted)">No files in this section.</div>';
      }

      // Column width calculation.
      // Jeremy always present (position 0), no CI chip.
      // Unknown column only if includeUnknown = true.
      var agentCols   = AGENT_ORDER; // all agents including Jeremy
      var extraCols   = includeUnknown ? 1 : 0;
      var totalUnits  = 2 + agentCols.length + extraCols; // 2 = file col weight
      var fileColPct  = (200 / totalUnits).toFixed(3) + "%";
      var agentColPct = (100 / totalUnits).toFixed(3) + "%";
      var totalColCount = agentCols.length + 1 + extraCols; // file + agents + unknown?

      var html = '<div class="section-header">' + escHtml(title) + '</div>';
      html += '<table class="canon-table"><thead><tr>';

      // File column header
      html += '<th class="col-file" style="width:' + fileColPct + '">File</th>';

      // Agent column headers — name + CI status merged into one cell
      agentCols.forEach(function(agentName) {
        var isJeremy = agentName.toLowerCase() === "jeremy";
        var row = agentStatusMap[agentName.toLowerCase()] || {};

        // Compute CI from sheet value if present, otherwise compute from declarations
        var ciValue = row["Canon Integrity"] || null;
        if (!ciValue && !isJeremy) {
          var declared = agentDeclaredFiles[agentName] || [];
          var flags    = agentDeclaredFiles[agentName + "_flags"] || [];
          ciValue = computeCanonIntegrity(agentName, declared, flags);
        }

        html += '<th style="width:' + agentColPct + '">';
        html += '<span class="th-agent-name">' + escHtml(agentName) + '</span>';

        if (isJeremy) {
          html += '<span class="th-jeremy-label">relay only</span>';
        } else {
          var color = ciColor(ciValue);
          var label = ciValue || "—";
          html += '<span class="th-ci" style="color:' + color + '">' + escHtml(label) + '</span>';
        }
        html += '</th>';
      });

      // Unknown column header (only if relevant)
      if (includeUnknown) {
        html += '<th style="width:' + agentColPct + ';color:var(--warn)">Unknown</th>';
      }

      html += '</tr></thead><tbody>';

      // Rows
      folders.forEach(function(folder) {
        var files = Object.keys(folderMap[folder]).sort();
        if (files.length === 0) return;

        // Folder separator row
        html += '<tr class="folder-row"><td colspan="' + totalColCount + '">/' + escHtml(folder) + '</td></tr>';

        files.forEach(function(fileName) {
          var entry = folderMap[folder][fileName];
          var fileOwner = inferFolder(fileName); // who this file belongs to by name

          html += '<tr>';
          html += '<td class="col-file" title="' + escHtml(fileName) + '">' +
            escHtml(fileName) +
            '<span class="location-tag">[' + escHtml(entry.location) + ']</span></td>';

          agentCols.forEach(function(agentName) {
            var isJeremy   = agentName.toLowerCase() === "jeremy";
            var declaredFlag = entry.agentFlags[agentName] || "";

            html += '<td class="col-agent">';

            if (declaredFlag) {
              // Agent declared this file — show the flag
              var fd = flagDisplay(declaredFlag);
              html += '<span class="flag-cell ' + fd.cls + '">' + fd.sym + ' ' + escHtml(fd.label) + '</span>';

            } else if (isJeremy) {
              // Jeremy column — file exists in his folder section
              // Show visibility dot only; he doesn't declare
              html += '<span class="flag-cell flag-empty">·</span>';

            } else if (fileOwner === agentName) {
              // This agent owns the file by name but didn't declare it — Orphaned
              html += '<span class="flag-cell flag-orphaned">! Orphaned</span>';

            } else {
              // Not this agent's file, not declared — empty
              html += '<span class="flag-cell flag-empty">·</span>';
            }

            html += '</td>';
          });

          // Unknown column cell (only if rendered)
          if (includeUnknown) {
            html += '<td class="col-agent"><span class="flag-cell flag-empty">·</span></td>';
          }

          html += '</tr>';
        });
      });

      html += '</tbody></table>';
      return html;
    }

    // Render Unknown section — only called if unknown has entries
    function renderUnknownSection(unknownMap, agentStatusMap) {
      var files = Object.keys(unknownMap).sort();
      if (files.length === 0) return "";

      var agentCols    = AGENT_ORDER;
      var totalUnits   = 2 + agentCols.length;
      var fileColPct   = (200 / totalUnits).toFixed(3) + "%";
      var agentColPct  = (100 / totalUnits).toFixed(3) + "%";
      var totalColCount = agentCols.length + 1;

      var html = '<div class="section-header" style="color:var(--warn)">Unknown — No Folder Match</div>';
      html += '<table class="canon-table"><thead><tr>';
      html += '<th class="col-file" style="width:' + fileColPct + '">File</th>';
      agentCols.forEach(function(agentName) {
        html += '<th style="width:' + agentColPct + '">' + escHtml(agentName) + '</th>';
      });
      html += '</tr></thead><tbody>';

      html += '<tr class="folder-row"><td colspan="' + totalColCount + '">/unknown</td></tr>';
      files.forEach(function(fileName) {
        var entry = unknownMap[fileName];
        html += '<tr>';
        html += '<td class="col-file" title="' + escHtml(fileName) + '">' +
          escHtml(fileName) +
          '<span class="location-tag">[' + escHtml(entry.location) + ']</span></td>';
        agentCols.forEach(function(agentName) {
          var flag = entry.agentFlags[agentName] || "";
          html += '<td class="col-agent">';
          if (flag) {
            var fd = flagDisplay(flag);
            html += '<span class="flag-cell ' + fd.cls + '">' + fd.sym + ' ' + escHtml(fd.label) + '</span>';
          } else {
            html += '<span class="flag-cell flag-empty">·</span>';
          }
          html += '</td>';
        });
        html += '</tr>';
      });

      html += '</tbody></table>';
      return html;
    }

    // ============================================================
    // UPDATE EMBEDDED JSON
    // Populates the <script type="application/json"> block
    // for Claude/QA readability at session open.
    // ============================================================
    function updateEmbeddedData(agentStatusMap, fileRows, generated) {
      var agentArr = AGENT_ORDER.map(function(name) {
        var row = agentStatusMap[name.toLowerCase()] || {};
        return {
          nickname:       name,
          agentId:        row["Agent ID"] || "",
          status:         row["Agent Status"] || "",
          canonIntegrity: name.toLowerCase() === "jeremy" ? null : (row["Canon Integrity"] || ""),
          mood:           row["Agent Mood"] || "",
          lastSignal:     row["Last Signal"] || ""
        };
      });
      var payload = { generated: generated, agents: agentArr, files: fileRows };
      document.getElementById("canon-data").textContent = JSON.stringify(payload, null, 2);
    }

    // ============================================================
    // MAIN LOAD
    // ============================================================
    async function loadData() {
      document.getElementById("lastRefresh").textContent = "Refreshing...";
      try {
        var bust = "&cachebust=" + Date.now();
        var [statusRes, filesRes] = await Promise.all([
          fetch(sheetUrl(TAB_STATUS) + bust),
          fetch(sheetUrl(TAB_FILES)  + bust)
        ]);

        var statusRows = parseCSV(await statusRes.text());
        var fileRows   = parseCSV(await filesRes.text());

        var agentStatusMap = latestAgentStatus(statusRows);

        // Build AGENT_ORDER from Agent Order column in sheet — data is the authority.
        // Each agent row has an Agent Order value (numeric). Sort ascending.
        // Agents missing the field sort to end. Jeremy always included.
        var orderMap = {};
        statusRows.forEach(function(r) {
          var name  = (r["Agent Nickname"] || "").trim();
          var order = parseInt(r["Agent Order"], 10);
          if (name && !isNaN(order)) orderMap[name] = order;
        });
        var agentNames = [];
        var seenAgents = {};
        statusRows.forEach(function(r) {
          var name = (r["Agent Nickname"] || "").trim();
          if (name && !seenAgents[name.toLowerCase()]) {
            seenAgents[name.toLowerCase()] = true;
            agentNames.push(name);
          }
        });
        agentNames.sort(function(a, b) {
          var oa = orderMap[a] !== undefined ? orderMap[a] : 999;
          var ob = orderMap[b] !== undefined ? orderMap[b] : 999;
          return oa !== ob ? oa - ob : a.localeCompare(b);
        });
        AGENT_ORDER = agentNames;

        // Build per-agent declared file lists and flag lists for CI computation
        var agentDeclaredFiles = {}; // { agentName: [fileNames], agentName_flags: [flags] }
        AGENT_ORDER.forEach(function(name) {
          agentDeclaredFiles[name]           = [];
          agentDeclaredFiles[name + "_flags"] = [];
        });
        fileRows.forEach(function(row) {
          var agent    = (row["Agent Nickname"] || "").trim();
          var fileName = (row["File Name"] || "").trim();
          var flag     = (row["Flag"] || "").trim();
          if (agent && fileName && agentDeclaredFiles[agent] !== undefined) {
            agentDeclaredFiles[agent].push(fileName);
            if (flag) agentDeclaredFiles[agent + "_flags"].push(flag);
          }
        });

        // Build matrix
        var matrix = buildMatrix(fileRows);

        // Determine if Unknown section has entries
        var hasUnknown = Object.keys(matrix.unknown).length > 0;

        // Render
        var output = "";
        output += renderSection("Drive",     matrix.drive,   agentStatusMap, agentDeclaredFiles, false);
        output += renderSection("Claude.ai", matrix.claudeai, agentStatusMap, agentDeclaredFiles, false);
        if (hasUnknown) {
          output += renderUnknownSection(matrix.unknown, agentStatusMap);
        }

        document.getElementById("canonOutput").innerHTML = output;
        document.getElementById("fileCount").textContent =
          fileRows.length + " file declaration" + (fileRows.length !== 1 ? "s" : "") + " in set";
        document.getElementById("lastRefresh").textContent =
          "Last refresh: " + new Date().toLocaleTimeString();

        updateEmbeddedData(agentStatusMap, fileRows, new Date().toISOString());

      } catch (err) {
        document.getElementById("canonOutput").innerHTML =
          '<div class="state-msg">' +
          '<div class="big">Error</div>' +
          '<div>Could not load canon data. Check SHEET_ID and sheet visibility.</div>' +
          '</div>';
        document.getElementById("lastRefresh").textContent = "Error loading data";
        console.error(err);
      }
    }

    loadData();
    setInterval(loadData, 60000);
  </script>
</body>
</html>
